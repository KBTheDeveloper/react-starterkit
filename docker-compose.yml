version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: starter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres:
    image: postgres:15-alpine
    container_name: starter-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: starter_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: starter-backend
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_DIALECT=postgres
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/starter_db
      - JWT_SECRET=${JWT_SECRET:-changeme_in_production}
      - JWT_EXPIRES_IN=7d
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: starter-shell
    depends_on:
      - backend
    restart: unless-stopped

  remote:
    build:
      context: .
      dockerfile: apps/remote/Dockerfile
    container_name: starter-remote
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: starter-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - remote
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
